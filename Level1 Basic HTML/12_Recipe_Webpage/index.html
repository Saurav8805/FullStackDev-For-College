<body>

<h1>How to Make Maggi</h1>

<h2>Ingredients</h2>

<ul>
<li>Maggi noodles</li>
<li>Water</li>
<li>Maggi masala</li>
</ul>

<h2>Steps</h2>

<ol>
<li>Boil water in a pan.</li>
<li>Add noodles.</li>
<li>Add masala.</li>
<li>Cook for 2 minutes.</li>
</ol>
