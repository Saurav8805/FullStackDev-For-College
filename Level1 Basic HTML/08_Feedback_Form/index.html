<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>
</head>

<body>

<h1>Website Feedback</h1>

<form>

<label>Name:</label><br>
<input type="text"><br><br>

<label>Email:</label><br>
<input type="email"><br><br>

<option>Poor</option>
</select><br><br>

<label>Comments:</label><br>
<textarea rows="5" cols="40"></textarea><br><br>

<input type="submit">

</form>

</body>
</html>
